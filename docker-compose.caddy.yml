# Caddy reverse proxy with automatic HTTPS + Cloudflare DNS for wildcard certs
# Used with: docker compose -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d
#
# Requires CLOUDFLARE_API_TOKEN in .env.production for wildcard TLS on *.brandmenow.store
# See docs/dns-setup.md for setup instructions.

services:
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: bmn-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - bmn-caddy-data:/data
      - bmn-caddy-config:/config
    depends_on:
      - client
      - server
      - storefront
    restart: always
    networks:
      - bmn-external
      - bmn-internal

volumes:
  bmn-caddy-data:
  bmn-caddy-config:
